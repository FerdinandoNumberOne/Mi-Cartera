<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Cartera Pro (FIX)</title>

<style>
body{
  font-family:Arial;
  background:#f5f7fa;
  padding:20px;
}
h2{
  color:#1e3a8a;
}
.card{
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  margin-bottom:20px;
}
input{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #ccc;
}
button{
  padding:12px;
  width:100%;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  font-weight:bold;
}
.result{
  font-size:18px;
  margin-top:10px;
}
.pos{color:green;font-weight:bold}
.neg{color:red;font-weight:bold}
</style>

</head>

<body>

<h2>📈 Mi Cartera (VERSIÓN QUE FUNCIONA)</h2>

<div class="card">

<label>Precio compra</label>
<input id="buy">

<label>Acciones</label>
<input id="shares">

<label>Precio actual</label>
<input id="price">

<label>FX (si USD → ej 0.92)</label>
<input id="fx" value="1">

<button onclick="calcular()">CALCULAR</button>

</div>

<div class="card">

<h3>📊 Resultado</h3>

<div class="result" id="valor"></div>
<div class="result" id="ganancia"></div>
<div class="result" id="rentabilidad"></div>

</div>

<script>

function calcular(){

  let buy = parseFloat(document.getElementById("buy").value);
  let shares = parseFloat(document.getElementById("shares").value);
  let price = parseFloat(document.getElementById("price").value);
  let fx = parseFloat(document.getElementById("fx").value);

  if(isNaN(buy) || isNaN(shares) || isNaN(price) || isNaN(fx)){
    alert("Faltan datos");
    return;
  }

  let coste = buy * shares;
  let valor = price * shares * fx;
  let ganancia = valor - coste;
  let rent = (ganancia / coste) * 100;

  document.getElementById("valor").innerHTML =
    "💰 Valor cartera: " + valor.toFixed(2) + " €";

  document.getElementById("ganancia").innerHTML =
    "📈 Ganancia: <span class='" + (ganancia>=0?"pos":"neg") + "'>" +
    ganancia.toFixed(2) + " €</span>";

  document.getElementById("rentabilidad").innerHTML =
    "📊 Rentabilidad: " + rent.toFixed(2) + " %";
}

</script>

</body>
</html>
